name: GameCI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    permissions:
      contents: read
      checks: write
    env:
      UNITY_VERSION: 2022.3.22f1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Moves packages
        run: |
          mkdir -p Packages/com.github.hkrn.ndmf-vrm-exporter
          mv Tests~ Tests
          mv Editor* Packages/com.github.hkrn.ndmf-vrm-exporter
          mv Tests* Packages/com.github.hkrn.ndmf-vrm-exporter
          mv package.json* Packages/com.github.hkrn.ndmf-vrm-exporter
      - name: Adds VPM registry
        uses: anatawa12/sh-actions/resolve-vpm-packages@1d155c7a26bcd0a54ffd9cb38fd66ab0d32d23cd
        with:
          repos: |
            https://vpm.anatawa12.com/vpm.json
            https://lilxyzw.github.io/vpm-repos/vpm.json
            https://vpm.nadena.dev/vpm.json
      - name: Adds all additional VPM packages via vrc-get for testing
        run: |
          vrc-get install -y com.anatawa12.avatar-optimizer
          vrc-get install -y jp.lilxyzw.liltoon
          vrc-get install -y jp.lilxyzw.lilycalinventory
          vrc-get install -y nadena.dev.modular-avatar
      - name: Retrieve cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: Library
          key: Library-unity-${{ env.UNITY_VERSION }}
          restore-keys: |
            Library-unity-${{ env.UNITY_VERSION }}
      - name: Run all tests
        id: runAllTests
        uses: game-ci/unity-test-runner@0ff419b913a3630032cbe0de48a0099b5a9f0ed9 # v4.3.1
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          testMode: EditMode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          unityVersion: ${{ env.UNITY_VERSION }}
          coverageOptions: generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;assemblyFilters:+com.github.hkrn.*
          customParameters: -nographics -assemblyNames com.github.hkrn.NDMFVRMExporterTests
      - name: Uploads test run result
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: Test results
          path: ${{ steps.runAllTests.outputs.coveragePath }}
